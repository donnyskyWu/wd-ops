server:
  port: 8080
  tomcat:
    max-http-form-post-size: 25MB
    max-swallow-size: 25MB

spring:
  application:
    name: ops-platform-module-oa
  profiles:
    active: dev
  servlet:
    multipart:
      # 富文本图片 5MB；MHTML 公众号归档可达 ~15MB
      max-file-size: 20MB
      max-request-size: 25MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

oa:
  auth:
    mode: dev-fixed
  crypto:
    aes-key: MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
  unified-collector:
    base-url: http://127.0.0.1:8000
    api-token: test-key-2026
    timeout-ms: 30000
  dingtalk:
    enabled: ${DINGTALK_ENABLED:false}
    client-id: ${DINGTALK_CLIENT_ID:}
    client-secret: ${DINGTALK_CLIENT_SECRET:}
    corp-id: ${DINGTALK_CORP_ID:}
    agent-id: ${DINGTALK_AGENT_ID:}
    robot:
      enabled: ${DINGTALK_ROBOT_ENABLED:false}
      robot-id: ${DINGTALK_ROBOT_ID:}
      webhook-url: ${DINGTALK_ROBOT_WEBHOOK_URL:}
      secret: ${DINGTALK_ROBOT_SECRET:}
  notification:
    platform-base-url: ${OA_PLATFORM_BASE_URL:http://localhost:5173}
    monitor-scan-cron: ${OA_NOTIFICATION_MONITOR_CRON:0 0/30 * * * ?}
  collect:
    schedule:
      enabled: true
      scan-cron: ${OA_COLLECT_SCHEDULE_CRON:0 * * * * ?}
  wework:
    base-url: https://qyapi.weixin.qq.com
    stub: false
    timeout-ms: 15000

logging:
  level:
    cn.iocoder.yudao.module.oa: INFO
