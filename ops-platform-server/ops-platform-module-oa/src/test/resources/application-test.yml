spring:
  datasource:
    url: jdbc:h2:mem:oa_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never
  task:
    scheduling:
      enabled: false

oa:
  auth:
    mode: dev-fixed
  crypto:
    aes-key: MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
  aochuang:
    stub: true

logging:
  level:
    cn.iocoder.yudao.module.oa: WARN
